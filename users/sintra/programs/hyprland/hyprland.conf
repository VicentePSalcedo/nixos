# Set your main modifier key
$mainMod = ALT

# Autostart applications
exec-once = swaybg -i /home/sintra/nixos/wallpapers/tokyonight.png -m fill
exec-once = waybar
exec-once = mako
exec-once = steam -silent
exec-once = signal-desktop --start-in-tray
exec-once = vesktop --start-minimized
exec-once = dopamine --minimized

# Monitor configuration (Forces scale 1 to prevent huge UI)
monitor = ,preferred,auto,1

# Input configuration
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = true
    }
}

# General styling
general {
    gaps_in = 3
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(414868aa)
    layout = dwindle
}

# Master layout configuration
# orientation = top  → master window takes the full top portion, slaves stack below
# mfact = 0.60       → master gets 60% of screen height (great for browser/devtools)
# new_on_top = true  → new windows push to top of slave stack instead of bottom
master {
    mfact = 0.60
    orientation = top
    new_on_top = true
}

# Dwindle layout configuration
dwindle {
    preserve_split = true
}

# Visual decoration
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 8
        passes = 2
    }
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(151522ee)
        color_inactive = rgba(10101499)
    }
}

# Animations
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Workspace Layout Rules (Native per-workspace layouts in Hyprland 0.54+)
workspace = 1, layout:master
workspace = 2, layout:master
workspace = 3, layout:dwindle
workspace = 4, layout:dwindle
workspace = 5, layout:dwindle
workspace = 6, layout:dwindle
workspace = 7, layout:dwindle
workspace = 8, layout:dwindle
workspace = 9, layout:dwindle
workspace = 10, layout:dwindle

# Keybindings
bind = $mainMod, RETURN, exec, ghostty
bind = $mainMod, N, exec, networkmanager_dmenu
bind = $mainMod, X, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, semicolon, exec, fuzzel
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, S, layoutmsg, togglesplit

# Master layout controls
# Alt+Ctrl+J = swap active window with master (promote)
# Alt+Ctrl+K = focus master window
# Alt+Ctrl+Shift+H/L = shrink/grow master area
bind = $mainMod CTRL, J, layoutmsg, swapwithmaster
bind = $mainMod CTRL, K, layoutmsg, focusmaster
bind = $mainMod CTRL SHIFT, H, resizeactive, -20 0
bind = $mainMod CTRL SHIFT, L, resizeactive, 20 0

# Toggle internal speaker on/off
bind = $mainMod SHIFT, S, exec, /home/sintra/nixos/users/sintra/programs/hyprland/toggle-speaker.sh

# Volume control
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, /home/sintra/nixos/users/sintra/programs/hyprland/toggle-mic.sh
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move focus with mainMod + Vim keys (h, j, k, l)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Swap/move windows with mainMod + SHIFT + Vim keys (h, j, k, l)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Switch workspaces with mainMod + [q w e r t y u i o p]
bind = $mainMod, Q, workspace, 1
bind = $mainMod, W, workspace, 2
bind = $mainMod, E, workspace, 3
bind = $mainMod, R, workspace, 4
bind = $mainMod, T, workspace, 5
bind = $mainMod, Y, workspace, 6
bind = $mainMod, U, workspace, 7
bind = $mainMod, I, workspace, 8
bind = $mainMod, O, workspace, 9
bind = $mainMod, P, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [q w e r t y u i o p]
bind = $mainMod SHIFT, Q, movetoworkspace, 1
bind = $mainMod SHIFT, W, movetoworkspace, 2
bind = $mainMod SHIFT, E, movetoworkspace, 3
bind = $mainMod SHIFT, R, movetoworkspace, 4
bind = $mainMod SHIFT, T, movetoworkspace, 5
bind = $mainMod SHIFT, Y, movetoworkspace, 6
bind = $mainMod SHIFT, U, movetoworkspace, 7
bind = $mainMod SHIFT, I, movetoworkspace, 8
bind = $mainMod SHIFT, O, movetoworkspace, 9
bind = $mainMod SHIFT, P, movetoworkspace, 10

# Brightness control
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Blur rules for layer shells (Hyprland v0.53+ syntax)
layerrule = blur on, match:namespace fuzzel
layerrule = ignore_alpha 0.5, match:namespace fuzzel

# ==============================================================================
# Silent Startup & Layout Optimizations (Hyprland v0.53+ Syntax)
# ==============================================================================

# Bind the main applications to their recommended ergonomic workspaces
# --- Workspace 1: Active Code / Dev ---
windowrule = match:class ^(com.mitchellh.ghostty)$, workspace 1
windowrule = match:class ^(codium)$|^([Vv]scodium)$|^([Cc]ode)$|^(VSCodium)$, workspace 1

# --- Workspace 2: Research / Web ---
windowrule = match:class ^([Zz]en)$|^([Zz]en-alpha)$|^([Ll]ibrewolf)$|^([Ff]irefox)$, workspace 2

# --- Workspace 3: File / Asset Management ---
windowrule = match:class ^([Tt]hunar)$, workspace 3

# --- Workspace 4: Communications (Start Minimized/Silent) ---
windowrule = match:class ^([Vv]esktop)$, workspace 4 silent
windowrule = match:class ^([Ss]ignal)$, workspace 4 silent
windowrule = match:class ^([Ss]lack)$, workspace 4 silent
windowrule = match:initial_title ^(aerc)$, workspace 4 silent

# --- Workspace 5: Gaming (Start Minimized/Silent) ---
windowrule = match:class ^(steam)$, workspace 5 silent
windowrule = match:class ^([Pp]rism[Ll]auncher)$|^([Oo]rg\.[Pp]rism[Ll]auncher\.[Pp]rism[Ll]auncher)$, workspace 5
windowrule = match:class ^([Pp]rotonup-qt)$, workspace 5

# --- Workspace 6: Acoustic Background (Start Minimized/Silent) ---
windowrule = match:class ^([Dd]opamine)$, workspace 6 silent
windowrule = match:class ^([Ss]potify)$, workspace 6 silent
windowrule = match:initial_title ^(pulsemixer)$, workspace 6

# --- Workspace 7: Consulting & Docs ---
windowrule = match:class ^([Oo]bsidian)$, workspace 7

# --- Workspace 8: Infra & Monitoring ---
windowrule = match:class ^([Vv]irt-manager)$, workspace 8
windowrule = match:initial_title ^(btm)$|^([Bb]ottom)$, workspace 8

# Prevent the main Steam client from starting as a floating window
windowrule {
    name = fix-steam-client-floating
    match:class = steam
    match:initial_title = Steam
    match:float = 1
    float = off
    maximize = on
}

# Automatically float and center annoying Steam sub-menus, lists, and popups
windowrule {
    name = float-steam-utilities
    match:class = steam
    match:title = ^(Sign in to Steam|Steam Login|Friends List|Chat|Settings|Steam Guard|Screenshot Uploader|Product Activation|Steam - News|Steam - Self Updater|WebHelper|Steam Guard - Computer Authorization Required)$
    float = on
    center = on
}

# Ensure Steam games (steam_app_*) run in full-screen with no compositor blur for maximum performance
windowrule = match:class ^(steam_app_\d+)$, fullscreen on
windowrule = match:class ^(steam_app_\d+)$, no_blur on

# Fallback: Force all floating Steam windows to center on screen (stops off-screen popups / login screens)
windowrule = match:class ^(steam)$, match:float 1, center on
