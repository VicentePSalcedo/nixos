# Set your main modifier key
$mainMod = ALT

# Autostart applications
exec-once = swaybg -i /home/sintra/nixos/wallpapers/tokyonight.png -m fill
exec-once = waybar
exec-once = mako

# Monitor configuration
monitor = ,preferred,auto,1

# Input configuration
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

# General styling
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(414868aa)
    layout = master
}

# Master layout configuration
master {
    mfact = 0.55
}

# Visual decoration
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 8
        passes = 2
    }
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(151522ee)
        color_inactive = rgba(10101499)
    }
}

# Animations
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Keybindings
bind = $mainMod, RETURN, exec, ghostty
bind = $mainMod, N, exec, networkmanager_dmenu
bind = $mainMod, X, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin
bind = $mainMod, V, togglefloating,
bind = $mainMod, semicolon, exec, fuzzel
bind = $mainMod, P, pseudo,
bind = $mainMod, S, layoutmsg, togglesplit

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move focus with mainMod + Vim keys (h, j, k, l)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Swap/move windows with mainMod + SHIFT + Vim keys (h, j, k, l)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Blur rules for layer shells (Hyprland v0.53+ syntax)
layerrule = blur on, match:namespace fuzzel
layerrule = ignore_alpha 0.5, match:namespace fuzzel

# ==============================================================================
# Steam Layout & Floating Optimizations (Hyprland v0.53+ Syntax)
# ==============================================================================

# Bind the main Steam client to always open on Workspace 5
windowrule = match:class ^(steam)$, workspace 5

# Prevent the main Steam client from starting as a floating window
windowrule {
    name = fix-steam-client-floating
    match:class = steam
    match:initial_title = Steam
    match:float = 1
    float = off
    maximize = on
}

# Automatically float and center annoying Steam sub-menus, lists, and popups
windowrule {
    name = float-steam-utilities
    match:class = steam
    match:title = ^(Sign in to Steam|Steam Login|Friends List|Chat|Settings|Steam Guard|Screenshot Uploader|Product Activation|Steam - News|Steam - Self Updater|WebHelper|Steam Guard - Computer Authorization Required)$
    float = on
    center = on
}

# Ensure Steam games (steam_app_*) run in full-screen with no compositor blur for maximum performance
windowrule = match:class ^(steam_app_\d+)$, fullscreen on
windowrule = match:class ^(steam_app_\d+)$, no_blur on

# Fallback: Force all floating Steam windows to center on screen (stops off-screen popups / login screens)
windowrule = match:class ^(steam)$, match:float 1, center on

