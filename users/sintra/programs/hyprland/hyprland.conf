# Set your main modifier key
$mainMod = ALT

# Monitor configuration (Forces scale 1 to prevent huge UI)
monitor = ,preferred,auto,1

# Input configuration
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = true
    }
}

# General styling
general {
    gaps_in = 3
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(7aa2f7) rgb(bb9af7) 45deg
    col.inactive_border = rgb(414868)
    layout = master
}

# Master layout configuration
# orientation = left → master window on the left, slaves stack on the right (split left/right)
# mfact = 0.50       → master gets 50% of screen width (equal split)
# new_on_top = true  → new windows push to top of slave stack instead of bottom
master {
    mfact = 0.50
    orientation = left
    new_on_top = true
}

# Dwindle layout configuration
dwindle {
    preserve_split = true
}

# Visual decoration
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        enabled = false
        size = 8
        passes = 2
    }
    shadow {
        enabled = false
        range = 15
        render_power = 3
        color = rgba(151522ee)
        color_inactive = rgba(10101499)
    }
}

# Animations
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ==============================================================================
# Modular Sources
# ==============================================================================
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/keybinds.conf
