# Import environment and start Foot server
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP; systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP; systemctl --user start foot.service

# Autostart applications
exec-once = swaybg -i /home/sintra/nixos/wallpapers/tokyonight.png -m fill
exec-once = waybar
exec-once = mako
exec-once = [workspace 2] zen
exec-once = [workspace 3] sh -c 'while [ ! -S "$XDG_RUNTIME_DIR/foot-$WAYLAND_DISPLAY.sock" ]; do sleep 0.1; done; exec footclient yazi'
exec-once = [workspace 4] sh -c 'while [ ! -S "$XDG_RUNTIME_DIR/foot-$WAYLAND_DISPLAY.sock" ]; do sleep 0.1; done; exec footclient verso'
exec-once = [workspace 6] sh -c 'while [ ! -S "$XDG_RUNTIME_DIR/foot-$WAYLAND_DISPLAY.sock" ]; do sleep 0.1; done; exec footclient podman-tui'
exec-once = [workspace 7] sh -c 'while [ ! -S "$XDG_RUNTIME_DIR/foot-$WAYLAND_DISPLAY.sock" ]; do sleep 0.1; done; exec footclient btm'
exec-once = [workspace 8] sh -c 'while [ ! -S "$XDG_RUNTIME_DIR/foot-$WAYLAND_DISPLAY.sock" ]; do sleep 0.1; done; exec footclient aerc'
exec-once = [workspace 9] sh -c 'while [ ! -S "$XDG_RUNTIME_DIR/foot-$WAYLAND_DISPLAY.sock" ]; do sleep 0.1; done; exec footclient nu -c "sleep 3sec; musikcube"'
exec-once = [workspace 10] sh -c 'while [ ! -S "$XDG_RUNTIME_DIR/foot-$WAYLAND_DISPLAY.sock" ]; do sleep 0.1; done; exec footclient hermes'
